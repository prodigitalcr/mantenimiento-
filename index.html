<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Reportes Profesional</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería html2pdf.js para exportar a PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        
        /* Estilos para los campos editables */
        [contenteditable="true"] {
            outline: none;
            transition: border-color 0.2s;
            cursor: text;
        }
        
        [contenteditable="true"]:hover {
            background-color: #f8fafc;
        }
        
        [contenteditable="true"]:focus {
            border-bottom-color: #3b82f6 !important;
            background-color: #eff6ff;
        }

        /* Placeholder para divs editables */
        [contenteditable="true"]:empty:before {
            content: attr(data-placeholder);
            color: #9ca3af;
            pointer-events: none;
            display: block;
        }

        /* Ocultar barra de herramientas al imprimir o generar PDF */
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: white;
            }
            .document-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10">

    <!-- Barra de Herramientas Flotante (GitHub Tool Bar) -->
    <div class="no-print fixed top-0 left-0 w-full bg-white shadow-md z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Report Generator Pro</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="limpiarCampos()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                Restablecer Todo
            </button>
            <button onclick="generarPDF()" class="flex items-center gap-2 px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Descargar PDF
            </button>
        </div>
    </div>

    <!-- Espacio para la barra fija -->
    <div class="h-16 no-print"></div>

    <!-- Contenedor del Documento Principal -->
    <div id="documento-reporte" class="document-container w-full max-w-[210mm] bg-white mt-8 p-12 shadow-2xl rounded-sm">
        
        <!-- Encabezado -->
        <div class="flex justify-between items-start border-b-2 border-gray-800 pb-6 mb-8">
            <div>
                <h2 class="text-3xl font-bold text-gray-900 tracking-tight uppercase" contenteditable="true" data-placeholder="TÍTULO">REPORTE OFICIAL</h2>
                <div class="mt-2 text-sm text-gray-600" contenteditable="true" data-placeholder="Departamento...">Departamento de Operaciones</div>
            </div>
            <div class="text-right">
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Información de Emisión</div>
                <div class="text-gray-800 font-medium">
                    Fecha: <span id="fecha-actual" contenteditable="true" class="font-normal text-gray-600 border-b border-transparent hover:border-blue-300">12 de mayo de 2026</span>
                </div>
                <div class="text-gray-800 font-medium">
                    Hora: <span id="hora-actual" contenteditable="true" class="font-normal text-gray-600 border-b border-transparent hover:border-blue-300">08:30 AM</span>
                </div>
            </div>
        </div>

        <!-- Información General -->
        <div class="grid grid-cols-2 gap-x-10 gap-y-6 mb-10">
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-500 uppercase">Preparado por</label>
                <div id="input-autor" contenteditable="true" data-placeholder="Nombre del autor..." class="border-b border-gray-300 py-1 text-gray-800 min-h-[30px]">Juan Pérez</div>
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-500 uppercase">Dirigido a / Supervisor</label>
                <div id="input-supervisor" contenteditable="true" data-placeholder="Nombre del receptor..." class="border-b border-gray-300 py-1 text-gray-800 min-h-[30px]">Ing. Ana García</div>
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-500 uppercase">Asunto</label>
                <div contenteditable="true" data-placeholder="Asunto del reporte..." class="border-b border-gray-300 py-1 text-gray-800 min-h-[30px]"></div>
            </div>
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-500 uppercase">Referencia</label>
                <div contenteditable="true" data-placeholder="Cód. Ref..." class="border-b border-gray-300 py-1 text-gray-800 min-h-[30px]"></div>
            </div>
        </div>

        <!-- Cuerpo -->
        <div class="space-y-10 min-h-[450px]">
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 border-l-4 border-blue-600 pl-3" contenteditable="true">1. Descripción de Situación</h3>
                <div contenteditable="true" data-placeholder="Escriba los detalles aquí..." class="text-gray-700 leading-relaxed text-justify w-full border border-transparent hover:border-gray-100 p-2 rounded min-h-[150px]"></div>
            </div>
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 border-l-4 border-blue-600 pl-3" contenteditable="true">2. Acciones y Soluciones</h3>
                <div contenteditable="true" data-placeholder="Describa las acciones tomadas..." class="text-gray-700 leading-relaxed text-justify w-full border border-transparent hover:border-gray-100 p-2 rounded min-h-[150px]"></div>
            </div>
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 border-l-4 border-blue-600 pl-3" contenteditable="true">3. Conclusiones</h3>
                <div contenteditable="true" data-placeholder="Resultados finales..." class="text-gray-700 leading-relaxed text-justify w-full border border-transparent hover:border-gray-100 p-2 rounded min-h-[100px]"></div>
            </div>
        </div>

        <!-- Firmas -->
        <div class="mt-20 pt-8 border-t border-gray-200 flex justify-around">
            <div class="flex flex-col items-center w-64 text-center">
                <div class="border-b-2 border-gray-800 w-full h-16 mb-2"></div>
                <div id="firma-autor" class="text-sm font-bold text-gray-800 uppercase">Juan Pérez</div>
                <div class="text-xs text-gray-500 font-semibold tracking-wider">FIRMA DEL RESPONSABLE</div>
            </div>
            <div class="flex flex-col items-center w-64 text-center">
                <div class="border-b-2 border-gray-800 w-full h-16 mb-2"></div>
                <div id="firma-supervisor" class="text-sm font-bold text-gray-800 uppercase">Ing. Ana García</div>
                <div class="text-xs text-gray-500 font-semibold tracking-wider">FIRMA DE APROBACIÓN</div>
            </div>
        </div>
    </div>

    <script>
        let autoActualizar = false;

        // Sincronización automática de firmas desde los campos superiores
        document.getElementById('input-autor').addEventListener('input', (e) => {
            document.getElementById('firma-autor').textContent = e.target.textContent || "NOMBRE DEL AUTOR";
        });
        document.getElementById('input-supervisor').addEventListener('input', (e) => {
            document.getElementById('firma-supervisor').textContent = e.target.textContent || "NOMBRE DEL SUPERVISOR";
        });

        // Si el usuario toca la fecha o la hora, deja de ser automático
        document.getElementById('fecha-actual').addEventListener('focus', () => autoActualizar = false);
        document.getElementById('hora-actual').addEventListener('focus', () => autoActualizar = false);

        function actualizarReloj() {
            if (!autoActualizar) return;
            const ahora = new Date();
            const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fecha-actual').textContent = ahora.toLocaleDateString('es-ES', opcionesFecha);
            document.getElementById('hora-actual').textContent = ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        setInterval(actualizarReloj, 60000);

        function generarPDF() {
            const element = document.getElementById('documento-reporte');
            const opt = {
                margin: [10, 0, 10, 0],
                filename: `Reporte_${new Date().toISOString().slice(0,10)}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function limpiarCampos() {
            const campos = document.querySelectorAll('[contenteditable="true"]');
            campos.forEach(c => { 
                // No borramos los IDs de fecha y hora, esos los maneja el reloj
                if(c.id !== 'fecha-actual' && c.id !== 'hora-actual') {
                    c.innerHTML = ''; 
                }
            });
            autoActualizar = true;
            actualizarReloj();
            document.getElementById('firma-autor').textContent = "NOMBRE DEL AUTOR";
            document.getElementById('firma-supervisor').textContent = "NOMBRE DEL SUPERVISOR";
        }
    </script>
</body>
</html>
